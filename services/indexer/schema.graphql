type SingleMethod @entity(immutable: true) {
  id: ID!
  controller: String!
  type: String!
  value: String!
  parentId: ID!
  parentType: String!
}

type VerificationMethod @entity(immutable: true) {
  id: ID!
  method: SingleMethod!
  didDoc: DIDDocument!
}

type Authentication @entity(immutable: true) {
  id: ID!
  uri: String
  method: SingleMethod
  didDoc: DIDDocument!
}

type AssertionMethod @entity(immutable: true) {
  id: ID!
  uri: String
  method: SingleMethod
  didDoc: DIDDocument!
}

type KeyAgreement @entity(immutable: true) {
  id: ID!
  uri: String
  method: SingleMethod
  didDoc: DIDDocument!
}

type CapabilityInvocation @entity(immutable: true) {
  id: ID!
  uri: String
  method: SingleMethod
  didDoc: DIDDocument!
}

type CapabilityDelegation @entity(immutable: true) {
  id: ID!
  uri: String
  method: SingleMethod
  didDoc: DIDDocument!
}

type Service @entity(immutable: true) {
  id: ID!
  type: String!
  serviceEndpoint: [String!]!
  didDoc: DIDDocument!
}

type DIDDocument @entity(immutable: true) {
  id: ID!
  owner: Bytes!
  controller: [String!]!
  verificationMethod: [VerificationMethod!]! @derivedFrom(field: "didDoc")
  authentication: [Authentication!] @derivedFrom(field: "didDoc")
  assertionMethod: [AssertionMethod!] @derivedFrom(field: "didDoc")
  keyAgreement: [KeyAgreement!] @derivedFrom(field: "didDoc")
  capabilityInvocation: [CapabilityInvocation!] @derivedFrom(field: "didDoc")
  capabilityDelegation: [CapabilityDelegation!] @derivedFrom(field: "didDoc")
  service: [Service!] @derivedFrom(field: "didDoc")
  alsoKnownAs: [String!]
  context: [String!]
}