specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: DIDRegistry
    network: mainnet
    source:
      address: "0x3DB4e80aE23AF99BA2a92Aa54E204c03766ce562"
      abi: DIDRegistry
      startBlock: 37759471
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - DIDAttributeItemAdded
        - DIDAttributeItemRevoked
        - DIDAttributeRevoked
        - DIDAttributeSet
        - DIDControllerAdded
        - DIDControllerRevoked
        - DIDOwnerChanged
        - DIDRegistered
        - Initialized
        - OwnershipTransferred
        - Upgraded
      abis:
        - name: DIDRegistry
          file: ./abis/DIDRegistry.json
      eventHandlers:
        - event: DIDAttributeItemAdded(uint128,uint128,string,uint256,bytes)
          handler: handleDIDAttributeItemAdded
        - event: DIDAttributeItemRevoked(uint128,uint128,string,uint256,bytes)
          handler: handleDIDAttributeItemRevoked
        - event: DIDAttributeRevoked(uint128,uint128,string,bytes)
          handler: handleDIDAttributeRevoked
        - event: DIDAttributeSet(uint128,uint128,string,bytes)
          handler: handleDIDAttributeSet
        - event: DIDControllerAdded(uint128,uint128,uint128)
          handler: handleDIDControllerAdded
        - event: DIDControllerRevoked(uint128,uint128,uint128)
          handler: handleDIDControllerRevoked
        - event: DIDOwnerChanged(uint128,address,address)
          handler: handleDIDOwnerChanged
        - event: DIDRegistered(uint128,address)
          handler: handleDIDRegistered
        - event: Initialized(uint64)
          handler: handleInitialized
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: Upgraded(indexed address)
          handler: handleUpgraded
      file: ./src/did-registry.ts
