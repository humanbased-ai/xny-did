[profile.default]
src = "src"
out = "out"
libs = ["lib"]
fs_permissions = [{ access = "read-write", path = "./" }]
optimizer = true
optimizer_runs = 200
via_ir = true
# Required by E2EPrecomputeTest, which uses vm.ffi to invoke the off-chain
# Python helper (script/did_identifier.py) for cross-language byte-match.
ffi = true

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
[rpc_endpoints]
local = "http://127.0.0.1:8545"
kite_test = "${KITE_TEST_PRC_URL}"
base = "https://mainnet.base.org"
base_sepolia = "https://base-sepolia.drpc.org"

[lint]
exclude_lints = ["asm-keccak256", "unsafe-cheatcode"]