[profile.default]
src = "src"
out = "out"
libs = ["lib"]
fs_permissions = [{ access = "read-write", path = "./" }]
optimizer = true
optimizer_runs = 200
via_ir = true

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
[rpc_endpoints]
local = "http://127.0.0.1:8545"
kite_test = "${KITE_TEST_PRC_URL}"
base = "https://mainnet.base.org"
base_sepolia = "https://base-sepolia.drpc.org"

# Test profile: opts into `vm.ffi` for the E2E precompute test
# (E2EPrecomputeTest invokes script/did_identifier.py to verify cross-language
# byte-match). Off by default to keep the security posture tight — `vm.ffi`
# lets tests run arbitrary shell commands.
[profile.test]
ffi = true

[lint]
exclude_lints = ["asm-keccak256", "unsafe-cheatcode"]