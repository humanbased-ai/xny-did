name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  # Run forge under the `test` profile so E2EPrecomputeTest can vm.ffi-invoke
  # the off-chain Python helper. (See [profile.test] in foundry.toml.)
  FOUNDRY_PROFILE: test

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install Python dependencies
        # E2EPrecomputeTest uses vm.ffi to invoke script/did_identifier.py.
        # `web3` transitively pulls `eth_utils`, which the helper imports.
        run: |
          python3 -m pip install --user -r script/requirements.txt

      - name: Show Forge version
        run: |
          forge --version

      - name: Run Forge fmt
        run: |
          forge fmt --check
        id: fmt

      - name: Run Forge build
        run: |
          forge build --sizes
        id: build

      - name: Run Forge tests
        run: |
          forge test -vvv
        id: test
